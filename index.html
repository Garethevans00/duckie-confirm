<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Duckie — Email Confirmed!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f7ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .duck { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #1a1a2e; font-size: 26px; font-weight: 700; margin-bottom: 10px; }
    .sub { color: #555; font-size: 16px; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #4f8ef7 0%, #3b6fd4 100%);
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .divider { color: #ccc; font-size: 13px; margin-bottom: 16px; }
    .note {
      background: #f8faff;
      border-radius: 12px;
      padding: 16px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }
    .note strong { color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <div class="duck">🦆</div>
    <h1>You're all confirmed!</h1>
    <p class="sub">Let's get quacking! Tap the button to open Duckie, or head back to the app and sign in — your account is ready.</p>
    <a id="openBtn" class="btn" href="duckie://auth/callback">Open Duckie 🦆</a>
    <p class="divider">— or —</p>
    <div class="note">
      <strong>Already have the app?</strong><br />
      Open Duckie on your phone and sign in with your email and password. Your account is confirmed and ready to go!
    </div>
  </div>
  <script>
    var hash = window.location.hash.substring(1);
    var search = window.location.search.substring(1);
    var fragment = hash || search;
    var target = fragment ? 'duckie://auth/callback#' + fragment : 'duckie://auth/callback';
    document.getElementById('openBtn').href = target;
    window.location.replace(target);
    setTimeout(function () { window.location.href = target; }, 500);
  </script>
</body>
</html>
